<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HTHT - Web Học Tập</title>

<style>
body{
    font-family: Arial;
    background:#f2f6ff;
    margin:0;
    text-align:center;
}
header{
    background:#2563eb;
    color:white;
    padding:15px;
}
button{
    padding:8px 15px;
    margin:5px;
    border:none;
    border-radius:6px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}
input{
    padding:8px;
    margin:5px;
}
.card{
    background:white;
    width:300px;
    margin:20px auto;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
.hidden{ display:none; }
.rank1{ color:gold; font-weight:bold; }
.rank2{ color:silver; font-weight:bold; }
.rank3{ color:#cd7f32; font-weight:bold; }
</style>
</head>

<body>

<header>
<h2>HTHT - Web Học Tập</h2>
</header>

<!-- LOGIN -->
<div id="loginBox" class="card">
<h3>Đăng nhập</h3>
<input id="loginUser" placeholder="Tài khoản"><br>
<input id="loginPass" type="password" placeholder="Mật khẩu"><br>
<button onclick="login()">Đăng nhập</button>
<button onclick="showRegister()">Tạo tài khoản</button>
</div>

<!-- REGISTER -->
<div id="registerBox" class="card hidden">
<h3>Tạo tài khoản</h3>
<input id="regUser" placeholder="Tài khoản"><br>
<input id="regPass" type="password" placeholder="Mật khẩu"><br>
<button onclick="register()">Tạo</button>
<button onclick="backLogin()">Quay lại</button>
</div>

<!-- MAIN -->
<div id="mainBox" class="hidden">

<div class="card">
<h3>👤 Profile</h3>
<p id="profileName"></p>
<p id="profileScore"></p>
<button onclick="logout()">Đăng xuất</button>
</div>

<div class="card">
<h3>📘 Bài Toán</h3>
<p id="question"></p>
<input id="answer" placeholder="Đáp án">
<button onclick="checkAnswer()">Làm bài</button>
<p id="result"></p>
</div>

<div class="card">
<h3>🏆 Xếp Hạng</h3>
<div id="ranking"></div>
</div>

<div class="card">
<h3>⏰ Báo Thức Học</h3>
<input type="time" id="alarmTime">
<button onclick="setAlarm()">Đặt</button>
<p id="alarmStatus"></p>
</div>

</div>

<script>

let currentUser = null;
let correctAnswer = 0;

// ===== ĐĂNG KÝ =====
function register(){
    let user = regUser.value;
    let pass = regPass.value;

    if(!user || !pass){
        alert("Nhập đủ thông tin");
        return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || {};

    if(users[user]){
        alert("Tài khoản đã tồn tại");
        return;
    }

    users[user] = {password:pass, score:0};
    localStorage.setItem("users", JSON.stringify(users));
    alert("Tạo thành công!");
    backLogin();
}

// ===== ĐĂNG NHẬP =====
function login(){
    let user = loginUser.value;
    let pass = loginPass.value;

    let users = JSON.parse(localStorage.getItem("users")) || {};

    if(users[user] && users[user].password === pass){
        currentUser = user;
        loginBox.classList.add("hidden");
        mainBox.classList.remove("hidden");
        loadProfile();
        generateQuestion();
        updateRanking();
    }else{
        alert("Sai tài khoản hoặc mật khẩu");
    }
}

// ===== PROFILE =====
function loadProfile(){
    let users = JSON.parse(localStorage.getItem("users"));
    profileName.innerText = "Tên: " + currentUser;
    profileScore.innerText = "Điểm: " + users[currentUser].score;
}

// ===== LOGOUT =====
function logout(){
    location.reload();
}

// ===== BÀI TOÁN CĂN BẬC 2 =====
function generateQuestion(){
    let num = Math.floor(Math.random()*100)+1;
    correctAnswer = Math.sqrt(num).toFixed(2);
    question.innerText = "√" + num + " = ?";
}

function checkAnswer(){
    let ans = answer.value;
    if(ans == correctAnswer){
        result.innerText = "Đúng +10 điểm!";
        let users = JSON.parse(localStorage.getItem("users"));
        users[currentUser].score += 10;
        localStorage.setItem("users", JSON.stringify(users));
        loadProfile();
        updateRanking();
        generateQuestion();
    }else{
        result.innerText = "Sai!";
    }
    answer.value="";
}

// ===== XẾP HẠNG =====
function updateRanking(){
    let users = JSON.parse(localStorage.getItem("users"));
    let arr = Object.entries(users);
    arr.sort((a,b)=>b[1].score - a[1].score);

    ranking.innerHTML="";
    arr.forEach((u,i)=>{
        let cls="";
        if(i==0) cls="rank1";
        if(i==1) cls="rank2";
        if(i==2) cls="rank3";

        ranking.innerHTML += 
        `<p class="${cls}">${i+1}. ${u[0]} - ${u[1].score} điểm</p>`;
    });
}

// ===== BÁO THỨC =====
function setAlarm(){
    let time = alarmTime.value;
    if(!time){
        alert("Chọn giờ");
        return;
    }

    alarmStatus.innerText="Đã đặt báo thức " + time;

    setInterval(()=>{
        let now = new Date();
        let current = now.getHours().toString().padStart(2,'0') + ":" +
                      now.getMinutes().toString().padStart(2,'0');

        if(current === time){
            alert("⏰ Tới giờ học rồi!");
        }
    },1000);
}

// ===== CHUYỂN BOX =====
function showRegister(){
    loginBox.classList.add("hidden");
    registerBox.classList.remove("hidden");
}
function backLogin(){
    registerBox.classList.add("hidden");
    loginBox.classList.remove("hidden");
}

</script>

</body>
</html>
