<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HTHT FULL FIXED</title>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#e3f2fd,#ffffff);
  text-align:center;
  margin:0;
}

.box{
  background:white;
  width:400px;
  margin:30px auto;
  padding:20px;
  border-radius:15px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,select,button{
  padding:8px;
  margin:6px;
  width:90%;
}

button{cursor:pointer;}
.hidden{display:none;}
</style>
</head>

<body>

<h2>HTHT FULL LOGIN + PROFILE</h2>

<!-- AUTH -->
<div class="box" id="authBox">

  <h3>Đăng ký</h3>
  <input id="regUser" placeholder="Tài khoản">
  <input id="regPass" type="password" placeholder="Mật khẩu">
  <button onclick="register()">Tạo tài khoản</button>

  <hr>

  <h3>Đăng nhập</h3>
  <input id="loginUser" placeholder="Tài khoản">
  <input id="loginPass" type="password" placeholder="Mật khẩu">
  <button onclick="login()">Đăng nhập</button>

</div>

<!-- MAIN -->
<div class="box hidden" id="mainBox">

  <h3 id="welcome"></h3>

  <button onclick="toggleProfile()">Mở / Đóng Profile</button>
  <button onclick="logout()">Đăng xuất</button>

  <div id="profileBox" class="hidden">

    <h3>Hồ sơ cá nhân</h3>

    <input id="displayName" placeholder="Tên hiển thị">

    <select id="province">
      <option value="">-- Chọn tỉnh --</option>
      <option>Hà Nội</option>
      <option>TP Hồ Chí Minh</option>
      <option>Hải Phòng</option>
      <option>Đà Nẵng</option>
      <option>Cần Thơ</option>
      <option>An Giang</option>
      <option>Bà Rịa - Vũng Tàu</option>
      <option>Bắc Giang</option>
      <option>Bắc Ninh</option>
      <option>Bến Tre</option>
      <option>Bình Dương</option>
      <option>Bình Phước</option>
      <option>Bình Thuận</option>
      <option>Cà Mau</option>
      <option>Cao Bằng</option>
      <option>Đắk Lắk</option>
      <option>Đồng Nai</option>
      <option>Đồng Tháp</option>
      <option>Gia Lai</option>
      <option>Hà Tĩnh</option>
      <option>Hưng Yên</option>
      <option>Khánh Hòa</option>
      <option>Kiên Giang</option>
      <option>Lâm Đồng</option>
      <option>Lạng Sơn</option>
      <option>Lào Cai</option>
      <option>Long An</option>
      <option>Nam Định</option>
      <option>Nghệ An</option>
      <option>Ninh Bình</option>
      <option>Phú Thọ</option>
      <option>Quảng Ninh</option>
      <option>Sóc Trăng</option>
      <option>Tây Ninh</option>
    </select>

    <button onclick="saveProfile()">Lưu Profile</button>

    <hr>

    <p id="profileInfo"></p>

  </div>

</div>

<script>
function getUsers(){
  return JSON.parse(localStorage.getItem("users")) || {};
}

function saveUsers(users){
  localStorage.setItem("users", JSON.stringify(users));
}

function register(){
  let username = document.getElementById("regUser").value.trim();
  let password = document.getElementById("regPass").value.trim();

  if(username === "" || password === ""){
    alert("Không để trống");
    return;
  }

  let users = getUsers();

  if(users[username]){
    alert("Tài khoản đã tồn tại");
    return;
  }

  users[username] = {
    password: password,
    displayName: "",
    province: ""
  };

  saveUsers(users);

  alert("Tạo thành công! Giờ đăng nhập.");
}

function login(){
  let username = document.getElementById("loginUser").value.trim();
  let password = document.getElementById("loginPass").value.trim();

  let users = getUsers();

  if(!users[username]){
    alert("Không tồn tại tài khoản");
    return;
  }

  if(users[username].password !== password){
    alert("Sai mật khẩu");
    return;
  }

  localStorage.setItem("currentUser", username);
  showMain(username);
}

function showMain(username){
  document.getElementById("authBox").classList.add("hidden");
  document.getElementById("mainBox").classList.remove("hidden");
  document.getElementById("welcome").innerText = "Xin chào " + username;
  loadProfile();
}

function logout(){
  localStorage.removeItem("currentUser");
  document.getElementById("authBox").classList.remove("hidden");
  document.getElementById("mainBox").classList.add("hidden");
}

function toggleProfile(){
  document.getElementById("profileBox").classList.toggle("hidden");
  loadProfile();
}

function loadProfile(){
  let user = localStorage.getItem("currentUser");
  if(!user) return;

  let users = getUsers();
  let u = users[user];

  document.getElementById("displayName").value = u.displayName || "";
  document.getElementById("province").value = u.province || "";
  showProfileInfo();
}

function saveProfile(){
  let user = localStorage.getItem("currentUser");
  let users = getUsers();

  users[user].displayName = document.getElementById("displayName").value.trim();
  users[user].province = document.getElementById("province").value;

  saveUsers(users);
  showProfileInfo();
  alert("Lưu thành công");
}

function showProfileInfo(){
  let user = localStorage.getItem("currentUser");
  if(!user) return;

  let users = getUsers();
  let u = users[user];

  document.getElementById("profileInfo").innerText =
    "Tên hiển thị: " + (u.displayName || "Chưa đặt") +
    " | Tỉnh: " + (u.province || "Chưa chọn");
}

function checkLogin(){
  let user = localStorage.getItem("currentUser");
  if(user){
    showMain(user);
  }
}

checkLogin();
</script>

</body>
</html>
