<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HTHT FULL PROFILE</title>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#d7f0ff,#ffffff);
  text-align:center;
  margin:0;
}

.box{
  background:white;
  width:430px;
  margin:25px auto;
  padding:20px;
  border-radius:15px;
  box-shadow:0 0 15px rgba(0,0,0,0.1);
}

input,select,button{
  padding:8px;
  margin:5px;
  width:90%;
}

button{cursor:pointer;}
.hidden{display:none;}
</style>
</head>

<body>

<h2>HTHT PROFILE 34 TỈNH</h2>

<div class="box" id="authBox">
  <h3>Đăng ký</h3>
  <input id="regUser" placeholder="Tài khoản">
  <input id="regPass" type="password" placeholder="Mật khẩu">
  <button onclick="register()">Tạo tài khoản</button>

  <hr>

  <h3>Đăng nhập</h3>
  <input id="loginUser" placeholder="Tài khoản">
  <input id="loginPass" type="password" placeholder="Mật khẩu">
  <button onclick="login()">Đăng nhập</button>
</div>

<div class="box hidden" id="mainBox">

  <h3 id="welcome"></h3>

  <button onclick="toggleProfile()">Mở / Đóng Profile</button>
  <button onclick="logout()">Đăng xuất</button>

  <div id="profileBox" class="hidden">

    <h3>Hồ sơ cá nhân</h3>

    <input id="displayName" placeholder="Tên hiển thị">

    <select id="province">
      <option value="">-- Chọn tỉnh --</option>
      <option>Hà Nội</option>
      <option>TP Hồ Chí Minh</option>
      <option>Hải Phòng</option>
      <option>Đà Nẵng</option>
      <option>Cần Thơ</option>
      <option>An Giang</option>
      <option>Bà Rịa - Vũng Tàu</option>
      <option>Bắc Giang</option>
      <option>Bắc Ninh</option>
      <option>Bến Tre</option>
      <option>Bình Dương</option>
      <option>Bình Phước</option>
      <option>Bình Thuận</option>
      <option>Cà Mau</option>
      <option>Cao Bằng</option>
      <option>Đắk Lắk</option>
      <option>Đồng Nai</option>
      <option>Đồng Tháp</option>
      <option>Gia Lai</option>
      <option>Hà Tĩnh</option>
      <option>Hưng Yên</option>
      <option>Khánh Hòa</option>
      <option>Kiên Giang</option>
      <option>Lâm Đồng</option>
      <option>Lạng Sơn</option>
      <option>Lào Cai</option>
      <option>Long An</option>
      <option>Nam Định</option>
      <option>Nghệ An</option>
      <option>Ninh Bình</option>
      <option>Phú Thọ</option>
      <option>Quảng Ninh</option>
      <option>Sóc Trăng</option>
      <option>Tây Ninh</option>
    </select>

    <button onclick="saveProfile()">Lưu profile</button>

    <hr>

    <p id="profileInfo"></p>

  </div>

</div>

<script>
let users = JSON.parse(localStorage.getItem("users")) || {};
let currentUser = localStorage.getItem("currentUser");

function save(){
  localStorage.setItem("users", JSON.stringify(users));
}

function register(){
  let u = regUser.value.trim();
  let p = regPass.value.trim();

  if(!u || !p){
    alert("Không để trống");
    return;
  }

  if(users[u]){
    alert("Tài khoản đã tồn tại");
    return;
  }

  users[u] = {
    password:p,
    displayName:"",
    province:""
  };

  save();
  alert("Tạo thành công! Giờ đăng nhập.");
}

function login(){
  let u = loginUser.value.trim();
  let p = loginPass.value.trim();

  if(!users[u]){
    alert("Không tồn tại tài khoản");
    return;
  }

  if(users[u].password !== p){
    alert("Sai mật khẩu");
    return;
  }

  currentUser = u;
  localStorage.setItem("currentUser", u);
  loadUser();
}

function logout(){
  localStorage.removeItem("currentUser");
  currentUser=null;
  authBox.classList.remove("hidden");
  mainBox.classList.add("hidden");
}

function loadUser(){
  currentUser = localStorage.getItem("currentUser");

  if(currentUser && users[currentUser]){
    authBox.classList.add("hidden");
    mainBox.classList.remove("hidden");
    welcome.innerText="Xin chào " + currentUser;
    showProfileInfo();
  }
}

function toggleProfile(){
  profileBox.classList.toggle("hidden");

  if(!profileBox.classList.contains("hidden")){
    let u = users[currentUser];
    displayName.value = u.displayName;
    province.value = u.province;
    showProfileInfo();
  }
}

function saveProfile(){
  users[currentUser].displayName = displayName.value.trim();
  users[currentUser].province = province.value;
  save();
  showProfileInfo();
  alert("Lưu thành công");
}

function showProfileInfo(){
  let u = users[currentUser];
  profileInfo.innerText =
    "Tên hiển thị: " + (u.displayName || "Chưa đặt") +
    " | Tỉnh: " + (u.province || "Chưa chọn");
}

loadUser();
</script>

</body>
</html>
