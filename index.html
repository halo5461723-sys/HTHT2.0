<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HTHT Học Tập Web</title>

<style>
body{
  font-family:Arial;
  margin:0;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  text-align:center;
}
nav{
  background:#111;
  padding:15px;
}
nav button{
  margin:5px;
  padding:8px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
.box{
  background:white;
  color:black;
  width:380px;
  margin:20px auto;
  padding:20px;
  border-radius:15px;
}
input,select{
  width:90%;
  padding:8px;
  margin:5px;
}
button{
  padding:8px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
.avatar{
  width:80px;
  height:80px;
  border-radius:50%;
  background:#eee;
  object-fit:cover;
}
.rankItem{
  background:white;
  color:black;
  margin:10px auto;
  padding:10px;
  border-radius:12px;
  width:90%;
  display:flex;
  align-items:center;
  gap:10px;
}
.progress{
  height:15px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
}
.progress div{
  height:100%;
  background:green;
}
.hidden{display:none;}
</style>
</head>

<body>

<h1>HTHT Học Tập Web</h1>

<nav id="menu" class="hidden">
  <button onclick="showSection('profile')">Profile</button>
  <button onclick="showSection('quiz')">Bài tập</button>
  <button onclick="showSection('rank')">Xếp hạng</button>
  <button onclick="logout()">Đăng xuất</button>
</nav>

<!-- LOGIN -->
<div class="box" id="authBox">
<h3>Đăng nhập</h3>
<input id="loginUser" placeholder="Tài khoản">
<input id="loginPass" type="password" placeholder="Mật khẩu">
<button onclick="login()">Đăng nhập</button>

<hr>

<h3>Đăng ký</h3>
<input id="regUser" placeholder="Tài khoản">
<input id="regPass" type="password" placeholder="Mật khẩu">
<select id="province">
<option value="">Chọn tỉnh</option>
<option>An Giang</option>
<option>Bà Rịa - Vũng Tàu</option>
<option>Bắc Giang</option>
<option>Bắc Kạn</option>
<option>Bạc Liêu</option>
<option>Bắc Ninh</option>
<option>Bến Tre</option>
<option>Bình Định</option>
<option>Bình Dương</option>
<option>Bình Phước</option>
<option>Bình Thuận</option>
<option>Cà Mau</option>
<option>Cần Thơ</option>
<option>Cao Bằng</option>
<option>Đà Nẵng</option>
<option>Đắk Lắk</option>
<option>Đắk Nông</option>
<option>Điện Biên</option>
<option>Đồng Nai</option>
<option>Đồng Tháp</option>
<option>Gia Lai</option>
<option>Hà Giang</option>
<option>Hà Nam</option>
<option>Hà Nội</option>
<option>Hà Tĩnh</option>
<option>Hải Dương</option>
<option>Hải Phòng</option>
<option>Hậu Giang</option>
<option>HCM</option>
<option>Hòa Bình</option>
<option>Hưng Yên</option>
<option>Khánh Hòa</option>
<option>Kiên Giang</option>
<option>Kon Tum</option>
<option>Lai Châu</option>
<option>Lâm Đồng</option>
<option>Lạng Sơn</option>
<option>Lào Cai</option>
<option>Long An</option>
<option>Nam Định</option>
<option>Nghệ An</option>
<option>Ninh Bình</option>
<option>Ninh Thuận</option>
<option>Phú Thọ</option>
<option>Phú Yên</option>
<option>Quảng Bình</option>
<option>Quảng Nam</option>
<option>Quảng Ngãi</option>
<option>Quảng Ninh</option>
<option>Quảng Trị</option>
<option>Sóc Trăng</option>
<option>Sơn La</option>
<option>Tây Ninh</option>
<option>Thái Bình</option>
<option>Thái Nguyên</option>
<option>Thanh Hóa</option>
<option>Thừa Thiên Huế</option>
<option>Tiền Giang</option>
<option>Trà Vinh</option>
<option>Tuyên Quang</option>
<option>Vĩnh Long</option>
<option>Vĩnh Phúc</option>
<option>Yên Bái</option>
</select>
<input id="school" placeholder="Tên trường">
<input id="className" placeholder="Lớp (VD 12A1)">
<button onclick="register()">Đăng ký</button>
</div>

<!-- PROFILE -->
<div id="profile" class="hidden box">
<img id="avatarImg" class="avatar">
<br><br>
<input type="file" onchange="uploadAvatar(event)">
<h3 id="profileName"></h3>
<p id="profileInfo"></p>
<p id="stats"></p>
<div class="progress"><div id="expBar"></div></div>
</div>

<!-- QUIZ -->
<div id="quiz" class="hidden box">
<h3>Làm bài (10 lần/ngày)</h3>
<select id="grade">
<option value="1">Lớp 1</option>
<option value="6">Lớp 6</option>
<option value="9">Lớp 9</option>
<option value="12">Lớp 12</option>
</select>
<button onclick="startQuiz()">Bắt đầu</button>
<h3 id="question"></h3>
<div id="answers"></div>
</div>

<!-- RANK -->
<div id="rank" class="hidden box">
<h3>Bảng xếp hạng</h3>
<div id="rankList"></div>
</div>

<script>
let users=JSON.parse(localStorage.getItem("users"))||[];
let currentUser=null;

function save(){localStorage.setItem("users",JSON.stringify(users));}

function register(){
 let u=document.getElementById("regUser").value;
 let p=document.getElementById("regPass").value;
 if(users.find(x=>x.user===u)) return alert("Tài khoản tồn tại");
 users.push({
   user:u,pass:p,score:0,
   province:province.value,
   school:school.value,
   className:className.value,
   avatar:"",
   done:0,correct:0,attempt:0,date:""
 });
 save();
 alert("Đăng ký thành công");
}

function login(){
 let u=document.getElementById("loginUser").value;
 let p=document.getElementById("loginPass").value;
 let found=users.find(x=>x.user===u && x.pass===p);
 if(!found) return alert("Sai tài khoản");
 currentUser=found;
 document.getElementById("authBox").classList.add("hidden");
 document.getElementById("menu").classList.remove("hidden");
 showSection("profile");
}

function logout(){location.reload();}

function showSection(id){
 ["profile","quiz","rank"].forEach(x=>document.getElementById(x).classList.add("hidden"));
 document.getElementById(id).classList.remove("hidden");
 if(id==="profile") loadProfile();
 if(id==="rank") loadRank();
}

function loadProfile(){
 avatarImg.src=currentUser.avatar||"";
 profileName.innerText=currentUser.user;
 profileInfo.innerText=currentUser.province+" | "+currentUser.school+" | "+currentUser.className;
 let percent=currentUser.done?Math.round(currentUser.correct/currentUser.done*100):0;
 stats.innerText="Điểm: "+currentUser.score+" | Đã làm: "+currentUser.done+" | Đúng: "+percent+"%";
 expBar.style.width=(currentUser.score%100)+"%";
}

function uploadAvatar(e){
 let reader=new FileReader();
 reader.onload=function(){
   currentUser.avatar=reader.result;
   save();
   loadProfile();
 };
 reader.readAsDataURL(e.target.files[0]);
}

function startQuiz(){
 let today=new Date().toDateString();
 if(currentUser.date!==today){currentUser.attempt=0;currentUser.date=today;}
 if(currentUser.attempt>=10) return alert("Hết lượt hôm nay");
 currentUser.attempt++;
 let grade=parseInt(grade.value);
 let a=Math.floor(Math.random()*10)+1;
 let b=Math.floor(Math.random()*10)+1;
 let ans=a*b;
 question.innerText=`${a} x ${b} = ?`;
 answers.innerHTML="";
 [ans,ans+1,ans-1,ans+2].sort(()=>Math.random()-0.5).forEach(v=>{
   let btn=document.createElement("button");
   btn.className="answerBtn";
   btn.innerText=v;
   btn.onclick=function(){
     currentUser.done++;
     if(v===ans){currentUser.score+=grade;currentUser.correct++;}
     save();
     loadProfile();
   };
   answers.appendChild(btn);
 });
}

function loadRank(){
 rankList.innerHTML="";
 users.sort((a,b)=>b.score-a.score);
 users.forEach((u,i)=>{
   rankList.innerHTML+=`
   <div class="rankItem">
     <img src="${u.avatar||""}" class="avatar">
     <div>
       <b>#${i+1} ${u.user}</b><br>
       ${u.province} | ${u.school} | ${u.className}<br>
       Điểm: ${u.score}
     </div>
   </div>`;
 });
}
</script>

</body>
</html>
