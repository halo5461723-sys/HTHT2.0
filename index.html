<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Báo Thức Thông Minh</title>

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;

  /* Nền vũ trụ */
  background-image: url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  color: white;
}

.container {
  background: rgba(0,0,0,0.6);
  padding: 30px;
  border-radius: 20px;
  text-align: center;
}

button {
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
  margin-top: 10px;
}

#addBtn {
  background: #00c3ff;
  color: white;
}

input {
  padding: 8px;
  border-radius: 8px;
  border: none;
  margin: 5px;
}
</style>
</head>

<body>

<div class="container">
  <h1>Báo Thức</h1>
  
  <input type="time" id="timeInput">
  <input type="text" id="nameInput" placeholder="Tên báo thức">
  <br>
  <button id="addBtn">+ Báo Thức</button>

  <h3 id="status"></h3>
</div>

<script>
let alarmTime = "";
let alarmName = "";

document.getElementById("addBtn").onclick = function() {
  alarmTime = document.getElementById("timeInput").value;
  alarmName = document.getElementById("nameInput").value;

  if(alarmTime === "") {
    alert("Chưa chọn giờ!");
    return;
  }

  document.getElementById("status").innerHTML = 
    "Đã đặt: " + alarmTime + " - " + alarmName;
};

setInterval(function() {
  let now = new Date();
  let currentTime = 
    now.getHours().toString().padStart(2,'0') + ":" + 
    now.getMinutes().toString().padStart(2,'0');

  if(currentTime === alarmTime) {
    alert("⏰ Đến giờ: " + alarmName);
    alarmTime = "";
  }
}, 1000);
</script>

</body>
</html>
