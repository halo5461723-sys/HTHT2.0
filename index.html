<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HTHT học tập web</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    color:white;
}
.box{
    background:white;
    color:black;
    width:350px;
    margin:20px auto;
    padding:20px;
    border-radius:15px;
}
button{
    padding:8px 15px;
    margin:5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
.answerBtn{
    display:block;
    width:100%;
}
</style>
</head>

<body>

<h1>HTHT Học Tập Web</h1>

<div class="box" id="loginBox">
<h3>Đăng nhập</h3>
<input id="loginUser" placeholder="Tên tài khoản"><br><br>
<input id="loginPass" type="password" placeholder="Mật khẩu"><br><br>
<button onclick="login()">Đăng nhập</button>

<hr>

<h3>Đăng ký</h3>
<input id="regUser" placeholder="Tên tài khoản"><br><br>
<input id="regPass" type="password" placeholder="Mật khẩu"><br><br>
<button onclick="register()">Tạo tài khoản</button>
</div>

<div class="box" id="mainWeb" style="display:none;">
<h3>Chọn lớp</h3>
<select id="classSelect">
<option value="1">Lớp 1</option>
<option value="2">Lớp 2</option>
<option value="3">Lớp 3</option>
<option value="4">Lớp 4</option>
<option value="5">Lớp 5</option>
<option value="6">Lớp 6</option>
<option value="7">Lớp 7</option>
<option value="8">Lớp 8</option>
<option value="9">Lớp 9</option>
<option value="10">Lớp 10</option>
<option value="11">Lớp 11</option>
<option value="12">Lớp 12</option>
</select>
<button onclick="startQuiz()">Làm bài</button>

<h3>Điểm: <span id="score">0</span></h3>

<div id="quizArea" style="display:none;">
<h2 id="question"></h2>
<div id="answers"></div>
</div>

</div>

<script>

// ADMIN AUTO CREATE
if(!localStorage.getItem("Hthtadmin")){
    localStorage.setItem("Hthtadmin","đkjsksjbdnd");
}

let currentUser = "";
let score = 0;
let answer = null;
let classLevel = 1;

// LOGIN
function login(){
    let u = loginUser.value;
    let p = loginPass.value;
    let saved = localStorage.getItem(u);

    if(saved === p){
        currentUser = u;
        loginBox.style.display="none";
        mainWeb.style.display="block";
        score = parseInt(localStorage.getItem(u+"_score")) || 0;
        document.getElementById("score").innerText = score;
    }else{
        alert("Sai tài khoản hoặc mật khẩu!");
    }
}

// REGISTER
function register(){
    let u = regUser.value;
    let p = regPass.value;

    if(localStorage.getItem(u)){
        alert("Tài khoản đã tồn tại!");
        return;
    }
    localStorage.setItem(u,p);
    localStorage.setItem(u+"_score",0);
    alert("Tạo thành công!");
}

// START QUIZ
function startQuiz(){
    classLevel = parseInt(classSelect.value);
    quizArea.style.display="block";
    generateQuestion();
}

// GENERATE QUESTION
function generateQuestion(){

    let q = "";
    let correct;

    if(classLevel <= 4){
        let a = rand(1,20);
        let b = rand(1,20);
        q = a + " + " + b;
        correct = a + b;
    }

    else if(classLevel <= 8){
        let a = rand(2,12);
        let b = rand(2,12);
        q = a + " × " + b;
        correct = a * b;
    }

    else if(classLevel <= 10){
        let a = rand(2,5);
        let b = rand(2,3);
        q = a + "^" + b;
        correct = Math.pow(a,b);
    }

    else{
        let a = rand(2,10);
        q = "√" + (a*a);
        correct = a;
    }

    answer = correct;
    question.innerText = q + " = ?";

    createAnswers(correct);
}

// CREATE ANSWERS
function createAnswers(correct){
    answers.innerHTML="";
    let options = [correct];

    while(options.length<4){
        let fake = correct + rand(-10,10);
        if(!options.includes(fake)){
            options.push(fake);
        }
    }

    options.sort(()=>Math.random()-0.5);

    options.forEach(opt=>{
        let btn = document.createElement("button");
        btn.className="answerBtn";
        btn.innerText=opt;
        btn.onclick=function(){checkAnswer(opt)};
        answers.appendChild(btn);
    });
}

// CHECK
function checkAnswer(choice){

    let buttons = document.querySelectorAll(".answerBtn");
    buttons.forEach(b=>b.disabled=true);

    if(choice === answer){
        alert("Đúng!");
        score += classLevel;
        localStorage.setItem(currentUser+"_score",score);
        document.getElementById("score").innerText=score;
    }else{
        alert("Sai!");
    }

    answer=null;

    setTimeout(()=>{
        generateQuestion();
    },1000);
}

// RANDOM
function rand(min,max){
    return Math.floor(Math.random()*(max-min+1))+min;
}

</script>

</body>
</html>
