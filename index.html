<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HTHT học tập web</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#4e73df,#1cc88a);
    color:white;
    text-align:center;
}
.box{
    background:rgba(0,0,0,0.4);
    padding:20px;
    border-radius:15px;
    width:90%;
    max-width:400px;
    margin:20px auto;
}
button{
    padding:8px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin:5px;
}
input,select{
    padding:6px;
    margin:5px;
    border-radius:6px;
    border:none;
}
.hidden{display:none;}
</style>
</head>

<body>

<h1>HTHT học tập web</h1>

<div id="loginBox" class="box">
    <h3>Đăng nhập</h3>
    <input id="username" placeholder="Tên tài khoản"><br>
    <input id="password" type="password" placeholder="Mật khẩu"><br>
    <button onclick="login()">Đăng nhập</button>
</div>

<div id="mainBox" class="hidden">

    <div class="box">
        <h3>Xin chào <span id="userShow"></span></h3>
        <p>Điểm của bạn: <span id="score">0</span></p>
        <button onclick="logout()">Đăng xuất</button>
    </div>

    <div class="box">
        <h3>Báo thức</h3>
        <input type="time" id="alarmTime">
        <button onclick="setAlarm()">Đặt báo thức</button>
    </div>

    <div class="box">
        <h3>Làm bài tập lấy điểm</h3>
        <select id="classSelect">
            <option value="1">Lớp 1</option>
            <option value="2">Lớp 2</option>
            <option value="3">Lớp 3</option>
            <option value="4">Lớp 4</option>
            <option value="5">Lớp 5</option>
            <option value="6">Lớp 6</option>
            <option value="7">Lớp 7</option>
            <option value="8">Lớp 8</option>
            <option value="9">Lớp 9</option>
            <option value="10">Lớp 10</option>
            <option value="11">Lớp 11</option>
            <option value="12">Lớp 12</option>
        </select>
        <button onclick="startQuiz()">Làm bài</button>
        <div id="quizBox"></div>
    </div>

</div>

<script>

// 🔐 Tạo admin mặc định (không ghi đè nếu đã có)
if(!localStorage.getItem("Hthtadmin")){
    localStorage.setItem("Hthtadmin","đkjsksjbdnd");
}

let currentUser = null;

// LOGIN
function login(){
    let user = username.value;
    let pass = password.value;

    if(localStorage.getItem(user) === pass){
        currentUser = user;
        loginBox.classList.add("hidden");
        mainBox.classList.remove("hidden");
        userShow.innerText = user;
        loadScore();
    } else {
        alert("Sai tài khoản hoặc mật khẩu!");
    }
}

function logout(){
    location.reload();
}

function loadScore(){
    let s = localStorage.getItem(currentUser+"_score") || 0;
    score.innerText = s;
}

// ⏰ BÁO THỨC
function setAlarm(){
    let time = alarmTime.value;
    if(!time) return alert("Chọn giờ!");

    setInterval(()=>{
        let now = new Date();
        let current = now.getHours().toString().padStart(2,"0")+":"+now.getMinutes().toString().padStart(2,"0");
        if(current === time){
            alert("⏰ Báo thức kêu!");
        }
    },1000);
}

// 📚 QUIZ
function startQuiz(){
    let last = localStorage.getItem(currentUser+"_lastQuiz");
    let now = Date.now();

    if(last && now - last < 86400000){
        alert("Bạn đã làm bài hôm nay rồi! 24h sau quay lại.");
        return;
    }

    localStorage.setItem(currentUser+"_lastQuiz", now);

    let cls = parseInt(classSelect.value);
    quizBox.innerHTML = "";

    for(let i=1;i<=10;i++){
        let a = Math.floor(Math.random()*10);
        let b = Math.floor(Math.random()*10);

        let div = document.createElement("div");
        div.innerHTML = `
            <p>Câu ${i}: ${a} + ${b} = ?
            <input type="number" id="q${i}">
            </p>
        `;
        quizBox.appendChild(div);

        div.dataset.answer = a+b;
    }

    let btn = document.createElement("button");
    btn.innerText="Nộp bài";
    btn.onclick=function(){submitQuiz(cls)};
    quizBox.appendChild(btn);
}

function submitQuiz(cls){
    let correct = 0;
    let divs = quizBox.querySelectorAll("div");

    divs.forEach((d,i)=>{
        let userAns = document.getElementById("q"+(i+1)).value;
        if(parseInt(userAns) === parseInt(d.dataset.answer)){
            correct++;
        }
    });

    let addScore = correct * cls;
    let oldScore = parseInt(localStorage.getItem(currentUser+"_score")||0);
    localStorage.setItem(currentUser+"_score", oldScore + addScore);

    alert("Đúng "+correct+" câu. +" + addScore + " điểm");
    loadScore();
    quizBox.innerHTML="";
}

</script>

</body>
</html>
