<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>HTHT học tập web</title>
<style>
body{
    font-family: Arial;
    text-align:center;
    background: linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    margin:0;
}
.header{
    display:flex;
    align-items:center;
    padding:10px;
}
.avatarBox{
    width:60px;
    height:60px;
    border-radius:50%;
    overflow:hidden;
    background:white;
    margin-right:10px;
}
.avatarBox img{
    width:100%;
    height:100%;
    object-fit:cover;
}
.box{
    background:white;
    color:black;
    width:360px;
    margin:20px auto;
    padding:20px;
    border-radius:15px;
}
input,select{
    width:90%;
    padding:8px;
}
button{
    padding:8px 15px;
    margin:5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
.answerBtn{
    width:100%;
    margin-top:5px;
}
.leaderboard-item{
    text-align:left;
    margin:5px 0;
}
</style>
</head>
<body><div class="header" id="userHeader" style="display:none;">
    <div class="avatarBox">
        <img id="avatarImg" src="" alt="avatar">
    </div>
    <div>
        <div id="welcomeUser"></div>
        <input type="file" accept="image/*" onchange="uploadAvatar(event)">
    </div>
</div><h1>HTHT Học Tập Web</h1><div class="box" id="authBox">
<h3>Đăng nhập</h3>
<input id="loginUser" placeholder="Tên tài khoản"><br><br>
<input id="loginPass" type="password" placeholder="Mật khẩu"><br><br>
<button onclick="login()">Đăng nhập</button>
<hr>
<h3>Đăng ký</h3>
<input id="regUser" placeholder="Tên tài khoản"><br><br>
<input id="regPass" type="password" placeholder="Mật khẩu"><br><br>
<button onclick="register()">Tạo tài khoản</button>
</div><div class="box" id="mainWeb" style="display:none;">
<h3>Chọn lớp</h3>
<select id="classSelect">
<option value="1">Lớp 1-4 (Cộng)</option>
<option value="5">Lớp 5-8 (Nhân)</option>
<option value="9">Lớp 9-10 (Lũy thừa)</option>
<option value="11">Lớp 11-12 (Căn)</option>
</select>
<button onclick="startQuiz()">Làm bài</button>
<h3>Điểm: <span id="score">0</span></h3>
<div id="quizArea" style="display:none;">
<h2 id="question"></h2>
<div id="answers"></div>
</div>
<hr>
<h3>Bảng xếp hạng</h3>
<div id="leaderboard"></div>
</div><script>

if(!localStorage.getItem("Hthtadmin")){
    localStorage.setItem("Hthtadmin","đkjsksjbdnd");
    localStorage.setItem("Hthtadmin_score",0);
}

let currentUser="";
let score=0;
let answer=null;
let level=1;

function login(){
    let u=loginUser.value;
    let p=loginPass.value;
    let saved=localStorage.getItem(u);

    if(saved===p){
        currentUser=u;
        score=parseInt(localStorage.getItem(u+"_score"))||0;
        document.getElementById("score").innerText=score;
        authBox.style.display="none";
        mainWeb.style.display="block";
        userHeader.style.display="flex";
        welcomeUser.innerText="Xin chào, "+u;
        loadAvatar();
        updateLeaderboard();
    }else{
        alert("Sai tài khoản hoặc mật khẩu!");
    }
}

function register(){
    let u=regUser.value;
    let p=regPass.value;

    if(u===""||p===""){
        alert("Nhập đủ thông tin!");
        return;
    }
    if(localStorage.getItem(u)){
        alert("Tài khoản đã tồn tại!");
        return;
    }
    localStorage.setItem(u,p);
    localStorage.setItem(u+"_score",0);
    alert("Tạo thành công!");
}

function uploadAvatar(event){
    const file=event.target.files[0];
    const reader=new FileReader();
    reader.onload=function(){
        localStorage.setItem(currentUser+"_avatar",reader.result);
        avatarImg.src=reader.result;
    }
    reader.readAsDataURL(file);
}

function loadAvatar(){
    let img=localStorage.getItem(currentUser+"_avatar");
    if(img){
        avatarImg.src=img;
    }else{
        avatarImg.src="";
    }
}

function startQuiz(){
    level=parseInt(classSelect.value);
    quizArea.style.display="block";
    generateQuestion();
}

function rand(min,max){
    return Math.floor(Math.random()*(max-min+1))+min;
}

function generateQuestion(){
    let q="";
    let correct;

    if(level<=4){
        let a=rand(1,20);
        let b=rand(1,20);
        q=a+" + "+b;
        correct=a+b;
    }
    else if(level<=8){
        let a=rand(2,12);
        let b=rand(2,12);
        q=a+" × "+b;
        correct=a*b;
    }
    else if(level<=10){
        let a=rand(2,5);
        let b=rand(2,3);
        q=a+"^"+b;
        correct=Math.pow(a,b);
    }
    else{
        let a=rand(2,10);
        q="√"+(a*a);
        correct=a;
    }

    answer=correct;
    question.innerText=q+" = ?";
    createAnswers(correct);
}

function createAnswers(correct){
    answers.innerHTML="";
    let options=[correct];

    while(options.length<4){
        let fake=correct+rand(-10,10);
        if(!options.includes(fake)){
            options.push(fake);
        }
    }

    options.sort(()=>Math.random()-0.5);

    options.forEach(opt=>{
        let btn=document.createElement("button");
        btn.className="answerBtn";
        btn.innerText=opt;
        btn.onclick=function(){checkAnswer(opt)};
        answers.appendChild(btn);
    });
}

function checkAnswer(choice){
    let buttons=document.querySelectorAll(".answerBtn");
    buttons.forEach(b=>b.disabled=true);

    if(choice===answer){
        alert("Đúng!");
        score+=level;
        localStorage.setItem(currentUser+"_score",score);
        document.getElementById("score").innerText=score;
        updateLeaderboard();
    }else{
        alert("Sai!");
    }

    setTimeout(()=>{generateQuestion();},1000);
}

function updateLeaderboard(){
    leaderboard.innerHTML="";
    let users=[];

    for(let i=0;i<localStorage.length;i++){
        let key=localStorage.key(i);
        if(key.endsWith("_score")){
            let user=key.replace("_score","");
            users.push({name:user,score:parseInt(localStorage.getItem(key))});
        }
    }

    users.sort((a,b)=>b.score-a.score);

    users.forEach((u,index)=>{
        let div=document.createElement("div");
        div.className="leaderboard-item";
        div.innerText=(index+1)+". "+u.name+" - "+u.score+" điểm";
        leaderboard.appendChild(div);
    });
}

</script></body>
</html>
