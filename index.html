<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HTHT Math</title>
<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg,#4e73df,#1cc88a);
  text-align:center;
  margin:0;
  color:white;
}
.card{
  background:white;
  color:black;
  margin:20px auto;
  padding:20px;
  border-radius:15px;
  width:90%;
  max-width:400px;
  box-shadow:0 5px 20px rgba(0,0,0,0.3);
}
button{
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#4e73df;
  color:white;
  font-weight:bold;
  margin:5px;
}
select,input{
  padding:8px;
  border-radius:8px;
  margin:5px;
}
#avatarPreview{
  width:80px;
  height:80px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #4e73df;
}
#progressBar{
  width:100%;
  height:15px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
}
#progressFill{
  height:100%;
  width:0%;
  background:#1cc88a;
}
.rankItem{
  background:#f8f9fc;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:2px solid #4e73df;
}
</style>
</head>
<body>

<h2>HTHT Math</h2>

<div class="card" id="profileCard">
  <h3>Hồ sơ</h3>
  <img id="avatarPreview">
  <br>
  <input type="text" id="nameInput" placeholder="Nhập tên">
  <br>
  <input type="text" id="avatarInput" placeholder="Link ảnh avatar">
  <br>
  <button onclick="saveProfile()">Lưu</button>
  <p id="scoreText"></p>
  <div id="progressBar"><div id="progressFill"></div></div>
</div>

<div class="card">
  <h3>Chọn lớp</h3>
  <select id="gradeSelect">
    <option value="1">Lớp 1</option>
    <option value="2">Lớp 2</option>
    <option value="3">Lớp 3</option>
    <option value="4">Lớp 4</option>
    <option value="5">Lớp 5</option>
    <option value="6">Lớp 6</option>
    <option value="7">Lớp 7</option>
    <option value="8">Lớp 8</option>
    <option value="9">Lớp 9</option>
    <option value="10">Lớp 10</option>
    <option value="11">Lớp 11</option>
    <option value="12">Lớp 12</option>
  </select>
  <br>
  <button onclick="startGame()">Bắt đầu</button>
  <h2 id="question"></h2>
  <input type="number" id="answer">
  <br>
  <button onclick="checkAnswer()">Trả lời</button>
</div>

<div class="card">
  <h3>Bảng xếp hạng (máy này)</h3>
  <div id="ranking"></div>
</div>

<script>
const KEY="HTHT_FIXED_USER_5973_V10";

function getUser(){
  let data=localStorage.getItem(KEY);
  return data?JSON.parse(data):null;
}

function saveUser(u){
  localStorage.setItem(KEY,JSON.stringify(u));
}

let user=getUser();

if(!user){
  user={
    name:"",
    avatar:"",
    score:0
  };
  saveUser(user);
}

function loadProfile(){
  document.getElementById("nameInput").value=user.name;
  document.getElementById("avatarInput").value=user.avatar;
  document.getElementById("avatarPreview").src=user.avatar||"https://i.imgur.com/1X5XQ9G.png";
  document.getElementById("scoreText").innerText="Điểm: "+user.score;
  updateProgress();
}

function saveProfile(){
  user.name=document.getElementById("nameInput").value;
  user.avatar=document.getElementById("avatarInput").value;
  saveUser(user);
  loadProfile();
}

function updateProgress(){
  let percent=(user.score%100);
  document.getElementById("progressFill").style.width=percent+"%";
}

let correctAnswer=0;

function startGame(){
  let grade=parseInt(document.getElementById("gradeSelect").value);
  let a=Math.floor(Math.random()*grade)+1;
  let b=Math.floor(Math.random()*grade)+1;
  correctAnswer=a+b;
  document.getElementById("question").innerText=a+" + "+b+" = ?";
}

function checkAnswer(){
  let ans=parseInt(document.getElementById("answer").value);
  if(ans===correctAnswer){
    user.score+=10;
    saveUser(user);
    alert("Đúng!");
  }else{
    alert("Sai!");
  }
  loadProfile();
  updateRanking();
}

function updateRanking(){
  let rankDiv=document.getElementById("ranking");
  rankDiv.innerHTML="";
  let item=document.createElement("div");
  item.className="rankItem";
  item.innerText=user.name+" - "+user.score+" điểm";
  rankDiv.appendChild(item);
}

loadProfile();
updateRanking();
</script>

</body>
</html>
