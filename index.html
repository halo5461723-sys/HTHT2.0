<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HTHT học tập web</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:#0008;
  padding:25px;
  border-radius:15px;
  width:350px;
  text-align:center;
}

input,button,select{
  width:90%;
  padding:8px;
  margin:6px 0;
  border:none;
  border-radius:8px;
}

button{background:#00c3ff;color:white;cursor:pointer;}
button:hover{background:#0099cc;}

.hidden{display:none;}
#clock{margin:8px 0;}
</style>
</head>

<body>

<div class="box">

<h2>HTHT học tập web</h2>

<!-- LOGIN -->
<div id="loginArea">
  <input id="user" placeholder="Tên tài khoản">
  <input id="pass" type="password" placeholder="Mật khẩu">
  <button onclick="save()">Đăng ký</button>
  <button onclick="login()">Đăng nhập</button>
</div>

<!-- MAIN -->
<div id="mainArea" class="hidden">

<h3 id="hello"></h3>
<p>⭐ Tổng điểm: <span id="score">0</span></p>

<!-- Đồng hồ -->
<div id="clock"></div>
<input type="time" id="alarm">
<button onclick="setAlarm()">Đặt báo thức</button>

<hr>

<!-- Bài tập -->
<button onclick="startExercise()">Làm bài tập lấy điểm</button>

<div id="exerciseArea" class="hidden">
  <select id="gradeSelect">
    <option value="1">Lớp 1</option>
    <option value="2">Lớp 2</option>
    <option value="3">Lớp 3</option>
    <option value="4">Lớp 4</option>
    <option value="5">Lớp 5</option>
    <option value="6">Lớp 6</option>
    <option value="7">Lớp 7</option>
    <option value="8">Lớp 8</option>
    <option value="9">Lớp 9</option>
    <option value="10">Lớp 10</option>
    <option value="11">Lớp 11</option>
    <option value="12">Lớp 12</option>
  </select>

  <button onclick="generateQuestion()">Ra câu hỏi</button>

  <p id="question"></p>
  <div id="choices"></div>
  <p id="result"></p>
  <p id="remaining"></p>
</div>

<button onclick="logout()">Đăng xuất</button>

</div>
</div>

<script>
let alarmTime=null;
let correctAnswer=0;
let totalScore=0;
let questionCount=0;

/* Load dữ liệu */
if(localStorage.score){
  totalScore=parseInt(localStorage.score);
}

/* ĐĂNG KÝ */
function save(){
  localStorage.user=user.value;
  localStorage.pass=pass.value;
  alert("Đã tạo tài khoản!");
}

/* LOGIN */
function login(){
  if(user.value==localStorage.user &&
     pass.value==localStorage.pass){

     loginArea.classList.add("hidden");
     mainArea.classList.remove("hidden");
     hello.innerHTML="Xin chào, "+user.value+" 👋";
     score.innerHTML=totalScore;
     checkDailyLimit();
  }else{
     alert("Sai tài khoản!");
  }
}

function logout(){location.reload();}

/* Đồng hồ */
setInterval(()=>{
  let now=new Date();
  clock.innerHTML="Bây giờ: "+now.toLocaleTimeString();

  let current=now.getHours().toString().padStart(2,"0")+":"+
              now.getMinutes().toString().padStart(2,"0");

  if(current==alarmTime){
    alert("⏰ Dậy học đi Nhàn!");
    alarmTime=null;
  }
},1000);

function setAlarm(){alarmTime=alarm.value;}

/* Bài tập */
function startExercise(){
  exerciseArea.classList.remove("hidden");
}

/* Giới hạn 10 câu mỗi 24h */
function checkDailyLimit(){
  let today=new Date().toDateString();

  if(localStorage.lastDate!==today){
     localStorage.lastDate=today;
     localStorage.dailyCount=0;
  }

  questionCount=parseInt(localStorage.dailyCount||0);
  remaining.innerHTML="Còn lại: "+(10-questionCount)+" câu hôm nay";
}

function generateQuestion(){

  if(questionCount>=10){
    alert("Hôm nay đã làm đủ 10 câu!");
    return;
  }

  let grade=parseInt(gradeSelect.value);

  let a=Math.floor(Math.random()*grade*5)+1;
  let b=Math.floor(Math.random()*grade*5)+1;

  correctAnswer=a+b;

  question.innerHTML="Tính: "+a+" + "+b+" = ?";

  let options=[
    correctAnswer,
    correctAnswer+Math.floor(Math.random()*5)+1,
    correctAnswer-Math.floor(Math.random()*5)-1,
    correctAnswer+2
  ];

  options.sort(()=>Math.random()-0.5);

  choices.innerHTML="";
  options.forEach(opt=>{
    let btn=document.createElement("button");
    btn.innerText=opt;
    btn.onclick=function(){checkAnswer(opt,grade);}
    choices.appendChild(btn);
  });
}

function checkAnswer(answer,grade){

  if(answer===correctAnswer){
    totalScore+=grade;
    score.innerHTML=totalScore;
    localStorage.score=totalScore;
    result.innerHTML="✅ Đúng! +"+grade+" điểm";
  }else{
    result.innerHTML="❌ Sai!";
  }

  questionCount++;
  localStorage.dailyCount=questionCount;
  remaining.innerHTML="Còn lại: "+(10-questionCount)+" câu hôm nay";
}
</script>

</body>
</html>
