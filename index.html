<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HTHT Account</title>
<style>
body{
  font-family: Arial;
  background:#eef2ff;
  text-align:center;
  margin:0;
}
.container{
  background:white;
  width:90%;
  max-width:400px;
  margin:40px auto;
  padding:20px;
  border-radius:12px;
  box-shadow:0 0 10px #ccc;
}
input,button{
  width:95%;
  padding:10px;
  margin:6px 0;
  border-radius:6px;
  border:1px solid #ccc;
}
button{
  background:#4f46e5;
  color:white;
  border:none;
}
button:hover{
  opacity:0.9;
}
.hidden{
  display:none;
}
.small{
  font-size:13px;
  color:gray;
}
</style>
</head>
<body>

<div class="container" id="authBox">

<h3>Đăng Ký</h3>
<input type="email" id="regEmail" placeholder="Email">
<input type="password" id="regPass" placeholder="Mật khẩu">
<input type="text" id="regName" placeholder="Tên hiển thị">
<button onclick="register()">Tạo tài khoản</button>

<hr>

<h3>Đăng Nhập</h3>
<input type="email" id="loginEmail" placeholder="Email">
<input type="password" id="loginPass" placeholder="Mật khẩu">
<button onclick="login()">Đăng nhập</button>

<p class="small">Dữ liệu lưu trên máy này</p>

</div>

<div class="container hidden" id="mainBox">
<h2 id="welcome"></h2>
<p>Email: <span id="showEmail"></span></p>
<button onclick="logout()">Đăng xuất</button>
</div>

<script>

// Lấy users
function getUsers(){
  return JSON.parse(localStorage.getItem("users") || "{}");
}

// Lưu users
function saveUsers(users){
  localStorage.setItem("users", JSON.stringify(users));
}

// Đăng ký
function register(){
  let email = document.getElementById("regEmail").value.trim().toLowerCase();
  let pass = document.getElementById("regPass").value;
  let name = document.getElementById("regName").value.trim();

  if(!email || !pass || !name){
    alert("Không được để trống");
    return;
  }

  let users = getUsers();

  if(users[email]){
    alert("Email đã tồn tại");
    return;
  }

  for(let e in users){
    if(users[e].name === name){
      alert("Tên hiển thị đã tồn tại");
      return;
    }
  }

  users[email] = {
    password: pass,
    name: name
  };

  saveUsers(users);
  alert("Tạo tài khoản thành công!");
}

// Đăng nhập
function login(){
  let email = document.getElementById("loginEmail").value.trim().toLowerCase();
  let pass = document.getElementById("loginPass").value;

  let users = getUsers();

  if(!users[email]){
    alert("Email không tồn tại");
    return;
  }

  if(users[email].password !== pass){
    alert("Sai mật khẩu");
    return;
  }

  localStorage.setItem("currentUser", email);
  showMain(email);
}

// Hiển thị sau login
function showMain(email){
  let users = getUsers();

  document.getElementById("authBox").classList.add("hidden");
  document.getElementById("mainBox").classList.remove("hidden");

  document.getElementById("welcome").innerText =
    "Xin chào " + users[email].name;

  document.getElementById("showEmail").innerText = email;
}

// Đăng xuất
function logout(){
  localStorage.removeItem("currentUser");
  location.reload();
}

// Tự login nếu còn phiên
window.onload = function(){
  let email = localStorage.getItem("currentUser");
  if(email){
    showMain(email);
  }
};

</script>

</body>
</html>
