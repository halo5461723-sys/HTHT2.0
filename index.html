<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Báo Thức</title>

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  background: white;   /* nền trắng đơn giản */
}

.container {
  padding: 30px;
  border-radius: 20px;
  text-align: center;
}

input {
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
  margin: 5px;
}

button {
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  background: #007bff;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #0056b3;
}
</style>
</head>

<body>

<div class="container">
  <h1>⏰ Báo Thức</h1>

  <input type="time" id="timeInput"><br>
  <input type="text" id="nameInput" placeholder="Tên báo thức"><br>

  <button onclick="setAlarm()">+ Báo Thức</button>

  <h3 id="status"></h3>
</div>

<script>
let alarmTime = "";
let alarmName = "";

function setAlarm() {
  alarmTime = document.getElementById("timeInput").value;
  alarmName = document.getElementById("nameInput").value;

  if(alarmTime === "") {
    alert("Chưa chọn giờ!");
    return;
  }

  document.getElementById("status").innerHTML =
    "Đã đặt: " + alarmTime + " - " + alarmName;
}

setInterval(function() {
  let now = new Date();
  let currentTime =
    now.getHours().toString().padStart(2,'0') + ":" +
    now.getMinutes().toString().padStart(2,'0');

  if(currentTime === alarmTime) {
    alert("⏰ Đến giờ: " + alarmName);
    alarmTime = "";
  }
}, 1000);
</script>

</body>
</html>
