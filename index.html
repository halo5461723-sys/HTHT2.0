<!DOCTYPE html><html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTHT V6 Multi User Stable</title>
<style>
body{
  font-family:Arial;
  margin:0;
  color:#fff;
  background:radial-gradient(ellipse at bottom,#0d1b2a 0%,#000814 70%);
}
.container{max-width:500px;margin:auto;padding:20px}
input,button{padding:10px;margin:5px 0;width:100%;border-radius:8px;border:none}
button{background:#00b4d8;color:#fff;font-weight:bold;cursor:pointer}
.card{background:rgba(255,255,255,0.07);padding:15px;border-radius:12px;margin-top:15px}
.rank-item{background:rgba(255,255,255,0.05);padding:8px;border-radius:8px;margin:5px 0}
</style>
</head>
<body>
<div class="container" id="app"></div><script>

// ===== STORAGE KEYS =====
const USERS_KEY = "htht_users";
const CURRENT_KEY = "htht_current";

// ===== GET USERS =====
function getUsers(){
  return JSON.parse(localStorage.getItem(USERS_KEY)) || [];
}

function saveUsers(users){
  localStorage.setItem(USERS_KEY, JSON.stringify(users));
}

function getCurrentUser(){
  return localStorage.getItem(CURRENT_KEY);
}

function setCurrentUser(username){
  localStorage.setItem(CURRENT_KEY, username);
}

function logout(){
  localStorage.removeItem(CURRENT_KEY);
  location.reload();
}

// ===== REGISTER =====
function register(){
  const username = document.getElementById("regUser").value.trim();
  const password = document.getElementById("regPass").value.trim();

  if(!username || !password){
    alert("Nhập đầy đủ thông tin!");
    return;
  }

  let users = getUsers();

  if(users.find(u=>u.username===username)){
    alert("Tài khoản đã tồn tại!");
    return;
  }

  users.push({
    username,
    password,
    score:0,
    dailyCount:0,
    lastDate:""
  });

  saveUsers(users);
  alert("Đăng ký thành công!");
  renderLogin();
}

// ===== LOGIN =====
function login(){
  const username = document.getElementById("loginUser").value.trim();
  const password = document.getElementById("loginPass").value.trim();

  const users = getUsers();
  const user = users.find(u=>u.username===username && u.password===password);

  if(!user){
    alert("Sai tài khoản hoặc mật khẩu!");
    return;
  }

  setCurrentUser(username);
  renderHome();
}

// ===== DAILY LIMIT =====
function canDoQuiz(user){
  const today = new Date().toLocaleDateString();

  if(user.lastDate !== today){
    user.lastDate = today;
    user.dailyCount = 0;
  }

  if(user.dailyCount >= 10){
    alert("Hôm nay đủ 10 lần rồi!");
    return false;
  }

  user.dailyCount++;
  return true;
}

// ===== DO QUIZ =====
function doQuiz(){
  let users = getUsers();
  let username = getCurrentUser();
  let user = users.find(u=>u.username===username);

  if(!canDoQuiz(user)) return;

  user.score += 10;

  saveUsers(users);
  renderHome();
}

// ===== RANKING =====
function renderRanking(){
  let users = getUsers();
  users.sort((a,b)=>b.score-a.score);

  return users.map((u,i)=>
    `<div class="rank-item">${i+1}. ${u.username} - ${u.score} điểm</div>`
  ).join("");
}

// ===== HOME =====
function renderHome(){
  let users = getUsers();
  let username = getCurrentUser();
  let user = users.find(u=>u.username===username);

  document.getElementById("app").innerHTML = `
    <h2>Xin chào ${user.username}</h2>
    <div class="card">
      <p>Điểm: <b>${user.score}</b></p>
      <p>Lần hôm nay: ${user.dailyCount}/10</p>
      <button onclick="doQuiz()">Làm bài (+10)</button>
      <button onclick="logout()">Đăng xuất</button>
    </div>
    <h3>Bảng xếp hạng</h3>
    ${renderRanking()}
  `;
}

// ===== LOGIN FORM =====
function renderLogin(){
  document.getElementById("app").innerHTML = `
    <h2>Đăng nhập</h2>
    <input id="loginUser" placeholder="Tài khoản">
    <input id="loginPass" type="password" placeholder="Mật khẩu">
    <button onclick="login()">Đăng nhập</button>
    <p>Chưa có tài khoản?</p>
    <button onclick="renderRegister()">Đăng ký</button>
  `;
}

// ===== REGISTER FORM =====
function renderRegister(){
  document.getElementById("app").innerHTML = `
    <h2>Đăng ký</h2>
    <input id="regUser" placeholder="Tài khoản">
    <input id="regPass" type="password" placeholder="Mật khẩu">
    <button onclick="register()">Tạo tài khoản</button>
    <button onclick="renderLogin()">Quay lại</button>
  `;
}

// ===== START =====
if(getCurrentUser()){
  renderHome();
}else{
  renderLogin();
}

</script></body>
</html>
