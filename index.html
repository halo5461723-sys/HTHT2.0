<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HTHT Web</title>
<style>
body{
    font-family: Arial;
    text-align:center;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    margin:0;
}
.box{
    background:white;
    margin:20px auto;
    padding:20px;
    width:90%;
    max-width:500px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}
button{
    padding:8px 15px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#4facfe;
    color:white;
}
input{
    padding:8px;
    border-radius:8px;
    border:1px solid #ccc;
}
.rank{
    border:2px solid gold;
    border-radius:10px;
    margin:5px;
    padding:5px;
}
img{
    width:80px;
    height:80px;
    border-radius:50%;
    object-fit:cover;
}
</style>
</head>
<body>

<div class="box" id="setupBox">
<h2>Nhập tên của bạn</h2>
<input id="nameInput" placeholder="Tên của bạn">
<br><br>
<button onclick="saveName()">Bắt đầu</button>
</div>

<div class="box" id="mainBox" style="display:none;">
<h2 id="hello"></h2>

<img id="avatar" src="https://i.imgur.com/6VBx3io.png">
<br><br>
<input type="file" onchange="changeAvatar(event)">
<br><br>

<p>Điểm: <span id="score">0</span></p>
<p>Tiến trình: <span id="progress">0%</span></p>

<button onclick="startQuiz()">Làm bài</button>
<button onclick="setAlarm()">Báo thức</button>

<h3>Bảng xếp hạng</h3>
<div id="ranking"></div>
</div>

<script>
let user = JSON.parse(localStorage.getItem("htht_user"));

if(user){
    showMain();
}

function saveName(){
    let name = document.getElementById("nameInput").value.trim();
    if(!name) return alert("Nhập tên đi");
    user = {
        name:name,
        score:0,
        progress:0,
        avatar:"https://i.imgur.com/6VBx3io.png"
    };
    localStorage.setItem("htht_user",JSON.stringify(user));
    showMain();
}

function showMain(){
    document.getElementById("setupBox").style.display="none";
    document.getElementById("mainBox").style.display="block";
    document.getElementById("hello").innerText="Xin chào "+user.name;
    document.getElementById("score").innerText=user.score;
    document.getElementById("progress").innerText=user.progress+"%";
    document.getElementById("avatar").src=user.avatar;
    updateRanking();
}

function startQuiz(){
    let a = Math.floor(Math.random()*20)+1;
    let b = Math.floor(Math.random()*20)+1;
    let answer = prompt("Tính: "+a+" + "+b);
    if(answer == a+b){
        user.score+=10;
        user.progress+=10;
        alert("Đúng!");
    }else{
        alert("Sai rồi!");
    }
    localStorage.setItem("htht_user",JSON.stringify(user));
    showMain();
}

function changeAvatar(event){
    let file = event.target.files[0];
    let reader = new FileReader();
    reader.onload=function(){
        user.avatar = reader.result;
        localStorage.setItem("htht_user",JSON.stringify(user));
        document.getElementById("avatar").src=user.avatar;
    }
    reader.readAsDataURL(file);
}

function updateRanking(){
    let list = JSON.parse(localStorage.getItem("htht_ranking")) || [];
    let found = list.find(u=>u.name===user.name);
    if(!found){
        list.push(user);
    }else{
        found.score=user.score;
    }
    list.sort((a,b)=>b.score-a.score);
    localStorage.setItem("htht_ranking",JSON.stringify(list));
    let html="";
    list.forEach((u,i)=>{
        html+=`<div class="rank">${i+1}. ${u.name} - ${u.score} điểm</div>`;
    });
    document.getElementById("ranking").innerHTML=html;
}

function setAlarm(){
    let sec = prompt("Nhập số giây:");
    if(!sec) return;
    setTimeout(()=>{
        alert("⏰ Báo thức!");
    },sec*1000);
}
</script>

</body>
</html>
