<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HTHT Học Tập</title>

<style>
body{
  font-family:Arial;
  margin:0;
  background:linear-gradient(135deg,#e3f2fd,#ffffff);
  text-align:center;
}

nav{
  background:#1976d2;
  padding:15px;
  color:white;
}

nav button{
  margin:5px;
  padding:8px 15px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.box{
  background:white;
  width:380px;
  margin:20px auto;
  padding:20px;
  border-radius:15px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input, select{
  width:90%;
  padding:8px;
  margin:5px;
}

button.answerBtn{
  width:100%;
  margin-top:5px;
}

img.avatar{
  width:80px;
  height:80px;
  border-radius:50%;
  object-fit:cover;
  background:white;
}

table{
  width:90%;
  margin:auto;
  border-collapse:collapse;
}

td, th{
  border:1px solid #ccc;
  padding:8px;
}
</style>
</head>

<body>

<nav id="menu" style="display:none;">
  <span id="welcome"></span>
  <button onclick="showSection('quiz')">Bài tập</button>
  <button onclick="showSection('profile')">Profile</button>
  <button onclick="showSection('rank')">Xếp hạng</button>
  <button onclick="logout()">Đăng xuất</button>
</nav>

<div class="box" id="authBox">
  <h3>Đăng ký</h3>
  <input id="regUser" placeholder="Tên tài khoản">
  <input id="regPass" type="password" placeholder="Mật khẩu">
  <button onclick="register()">Tạo tài khoản</button>

  <hr>

  <h3>Đăng nhập</h3>
  <input id="loginUser" placeholder="Tên tài khoản">
  <input id="loginPass" type="password" placeholder="Mật khẩu">
  <button onclick="login()">Đăng nhập</button>
</div>

<div id="quiz" style="display:none;">
  <div class="box">
    <h3>Làm bài (10 câu/ngày)</h3>
    <select id="gradeSelect">
      <option value="1">Lớp 1</option>
      <option value="6">Lớp 6</option>
      <option value="9">Lớp 9</option>
      <option value="12">Lớp 12</option>
    </select>
    <p id="question"></p>
    <div id="answers"></div>
    <p id="limitInfo"></p>
  </div>
</div>

<div id="profile" style="display:none;">
  <div class="box">
    <h3>Profile</h3>
    <img id="avatarImg" class="avatar"><br>
    <input type="file" onchange="uploadAvatar(event)">
    <p id="info"></p>
  </div>
</div>

<div id="rank" style="display:none;">
  <div class="box">
    <h3>Bảng xếp hạng</h3>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Avatar</th>
          <th>Tên</th>
          <th>Điểm</th>
        </tr>
      </thead>
      <tbody id="rankTable"></tbody>
    </table>
  </div>
</div>

<script>
let users = JSON.parse(localStorage.getItem("users")) || {};
let currentUser = localStorage.getItem("currentUser");

function save(){
  localStorage.setItem("users", JSON.stringify(users));
}

function register(){
  let u = regUser.value.trim();
  let p = regPass.value.trim();
  if(users[u]) return alert("Tài khoản đã tồn tại");
  users[u] = {
    password:p,
    score:0,
    correct:0,
    total:0,
    today:0,
    date:new Date().toDateString(),
    avatar:""
  };
  save();
  alert("Tạo thành công");
}

function login(){
  let u = loginUser.value.trim();
  let p = loginPass.value.trim();
  if(users[u] && users[u].password === p){
    localStorage.setItem("currentUser",u);
    location.reload();
  }else{
    alert("Sai tài khoản hoặc mật khẩu");
  }
}

function logout(){
  localStorage.removeItem("currentUser");
  location.reload();
}

function showSection(id){
  quiz.style.display="none";
  profile.style.display="none";
  rank.style.display="none";
  document.getElementById(id).style.display="block";
  if(id==="rank") loadRank();
}

if(currentUser && users[currentUser]){
  authBox.style.display="none";
  menu.style.display="block";
  welcome.innerText="Xin chào "+currentUser+" | Điểm: "+users[currentUser].score;
  showSection("quiz");
}

function newQuestion(){
  let grade=parseInt(gradeSelect.value);
  let a=Math.floor(Math.random()*10)+1;
  let b=Math.floor(Math.random()*10)+1;
  let correct=a+b;
  question.innerText=a+" + "+b+" = ?";
  answers.innerHTML="";
  for(let i=0;i<4;i++){
    let btn=document.createElement("button");
    btn.className="answerBtn";
    let ans=i===0?correct:correct+Math.floor(Math.random()*5)+1;
    btn.innerText=ans;
    btn.onclick=function(){check(ans,correct,grade)};
    answers.appendChild(btn);
  }
}

function check(ans,correct,grade){
  let user=users[currentUser];
  if(user.date!==new Date().toDateString()){
    user.today=0;
    user.date=new Date().toDateString();
  }
  if(user.today>=10){
    return alert("Hết lượt hôm nay");
  }
  user.today++;
  user.total++;
  if(ans===correct){
    user.score+=grade;
    user.correct++;
  }
  save();
  newQuestion();
}

function loadRank(){
  let arr=Object.keys(users).map(u=>({name:u,score:users[u].score,avatar:users[u].avatar}));
  arr.sort((a,b)=>b.score-a.score);
  rankTable.innerHTML="";
  arr.forEach((u,i)=>{
    rankTable.innerHTML+=`
    <tr>
      <td>${i+1}</td>
      <td><img src="${u.avatar||''}" class="avatar"></td>
      <td>${u.name}</td>
      <td>${u.score}</td>
    </tr>`;
  });
}

function uploadAvatar(e){
  let reader=new FileReader();
  reader.onload=function(){
    users[currentUser].avatar=reader.result;
    save();
    avatarImg.src=reader.result;
  }
  reader.readAsDataURL(e.target.files[0]);
}

gradeSelect.onchange=newQuestion;
newQuestion();
</script>

</body>
</html>
