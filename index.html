<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HTHT học tập web</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background: linear-gradient(135deg,#667eea,#764ba2);
    color:white;
}
.box{
    background:white;
    color:black;
    width:360px;
    margin:20px auto;
    padding:20px;
    border-radius:15px;
}
input{
    width:90%;
    padding:8px;
}
button{
    padding:8px 15px;
    margin:5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
.answerBtn{
    width:100%;
    margin-top:5px;
}
</style>
</head>

<body>

<h1>HTHT Học Tập Web</h1>

<!-- LOGIN + REGISTER -->
<div class="box" id="authBox">

<h3>Đăng nhập</h3>
<input id="loginUser" placeholder="Tên tài khoản"><br><br>
<input id="loginPass" type="password" placeholder="Mật khẩu"><br><br>
<button onclick="login()">Đăng nhập</button>

<hr>

<h3>Đăng ký</h3>
<input id="regUser" placeholder="Tên tài khoản"><br><br>
<input id="regPass" type="password" placeholder="Mật khẩu"><br><br>
<button onclick="register()">Tạo tài khoản</button>

</div>

<!-- MAIN WEB -->
<div class="box" id="mainWeb" style="display:none;">

<h3>Chọn lớp</h3>
<select id="classSelect">
<option value="1">Lớp 1-4 (Cộng)</option>
<option value="5">Lớp 5-8 (Nhân)</option>
<option value="9">Lớp 9-10 (Lũy thừa)</option>
<option value="11">Lớp 11-12 (Căn)</option>
</select>

<button onclick="startQuiz()">Làm bài</button>

<h3>Điểm: <span id="score">0</span></h3>

<div id="quizArea" style="display:none;">
<h2 id="question"></h2>
<div id="answers"></div>
</div>

</div>

<script>

// ===== ADMIN AUTO CREATE =====
if(!localStorage.getItem("Hthtadmin")){
    localStorage.setItem("Hthtadmin","đkjsksjbdnd");
    localStorage.setItem("Hthtadmin_score",0);
}

let currentUser="";
let score=0;
let answer=null;
let level=1;

// LOGIN
function login(){
    let u=loginUser.value;
    let p=loginPass.value;
    let saved=localStorage.getItem(u);

    if(saved===p){
        currentUser=u;
        score=parseInt(localStorage.getItem(u+"_score"))||0;
        document.getElementById("score").innerText=score;
        authBox.style.display="none";
        mainWeb.style.display="block";
    }else{
        alert("Sai tài khoản hoặc mật khẩu!");
    }
}

// REGISTER
function register(){
    let u=regUser.value;
    let p=regPass.value;

    if(u===""||p===""){
        alert("Nhập đủ thông tin!");
        return;
    }

    if(localStorage.getItem(u)){
        alert("Tài khoản đã tồn tại!");
        return;
    }

    localStorage.setItem(u,p);
    localStorage.setItem(u+"_score",0);
    alert("Tạo thành công!");
}

// START QUIZ
function startQuiz(){
    level=parseInt(classSelect.value);
    quizArea.style.display="block";
    generateQuestion();
}

// RANDOM
function rand(min,max){
    return Math.floor(Math.random()*(max-min+1))+min;
}

// GENERATE QUESTION
function generateQuestion(){

    let q="";
    let correct;

    if(level<=4){
        let a=rand(1,20);
        let b=rand(1,20);
        q=a+" + "+b;
        correct=a+b;
    }
    else if(level<=8){
        let a=rand(2,12);
        let b=rand(2,12);
        q=a+" × "+b;
        correct=a*b;
    }
    else if(level<=10){
        let a=rand(2,5);
        let b=rand(2,3);
        q=a+"^"+b;
        correct=Math.pow(a,b);
    }
    else{
        let a=rand(2,10);
        q="√"+(a*a);
        correct=a;
    }

    answer=correct;
    question.innerText=q+" = ?";

    createAnswers(correct);
}

// CREATE ANSWERS
function createAnswers(correct){
    answers.innerHTML="";
    let options=[correct];

    while(options.length<4){
        let fake=correct+rand(-10,10);
        if(!options.includes(fake)){
            options.push(fake);
        }
    }

    options.sort(()=>Math.random()-0.5);

    options.forEach(opt=>{
        let btn=document.createElement("button");
        btn.className="answerBtn";
        btn.innerText=opt;
        btn.onclick=function(){checkAnswer(opt)};
        answers.appendChild(btn);
    });
}

// CHECK ANSWER
function checkAnswer(choice){

    let buttons=document.querySelectorAll(".answerBtn");
    buttons.forEach(b=>b.disabled=true);

    if(choice===answer){
        alert("Đúng!");
        score+=level;
        localStorage.setItem(currentUser+"_score",score);
        document.getElementById("score").innerText=score;
    }else{
        alert("Sai!");
    }

    answer=null;

    setTimeout(()=>{
        generateQuestion();
    },1000);
}

</script>

</body>
</html>
