<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HTHT Web</title>
<style>
body{
  font-family: Arial;
  background:#eef2ff;
  text-align:center;
  margin:0;
}
.box{
  background:white;
  width:90%;
  max-width:420px;
  margin:20px auto;
  padding:20px;
  border-radius:12px;
  box-shadow:0 0 10px #ccc;
}
input,button{
  width:95%;
  padding:10px;
  margin:6px 0;
  border-radius:6px;
  border:1px solid #ccc;
}
button{
  background:#4f46e5;
  color:white;
  border:none;
}
button:active{
  opacity:0.7;
}
.hidden{display:none;}
img{
  width:100px;
  height:100px;
  border-radius:50%;
  object-fit:cover;
}
</style>
</head>
<body>

<div class="box" id="setupBox">
<h3>Tạo người dùng</h3>
<input type="text" id="nameInput" placeholder="Nhập tên">
<input type="file" id="avatarInput" accept="image/*">
<button id="startBtn">Bắt đầu</button>
</div>

<div class="box hidden" id="mainBox">
<h2 id="welcome"></h2>

<button id="profileBtn">Profile</button>
<button id="mathBtn">Làm Toán</button>
<button id="rankBtn">Xếp hạng</button>

<div id="content"></div>
</div>

<script>

// ===== LẤY & LƯU USERS =====
function getUsers(){
  return JSON.parse(localStorage.getItem("users") || "[]");
}

function saveUsers(users){
  localStorage.setItem("users", JSON.stringify(users));
}

// ===== TẠO USER =====
document.getElementById("startBtn").addEventListener("click", function(){

  let name = document.getElementById("nameInput").value.trim();
  let file = document.getElementById("avatarInput").files[0];

  if(!name){
    alert("Nhập tên đi 😑");
    return;
  }

  let users = getUsers();

  if(users.some(u => u.name === name)){
    alert("Tên đã tồn tại");
    return;
  }

  let reader = new FileReader();

  reader.onload = function(e){

    let newUser = {
      name: name,
      avatar: e.target.result || "",
      score: 0
    };

    users.push(newUser);
    saveUsers(users);
    localStorage.setItem("currentUser", name);

    showMain(newUser);
  };

  if(file){
    reader.readAsDataURL(file);
  }else{
    reader.onload({target:{result:""}});
  }

});

// ===== HIỂN THỊ MAIN =====
function showMain(user){
  document.getElementById("setupBox").classList.add("hidden");
  document.getElementById("mainBox").classList.remove("hidden");
  document.getElementById("welcome").innerText = "Xin chào " + user.name;
}

// ===== PROFILE =====
document.getElementById("profileBtn").addEventListener("click", function(){

  let users = getUsers();
  let name = localStorage.getItem("currentUser");
  let user = users.find(u => u.name === name);

  document.getElementById("content").innerHTML = `
    <h3>Profile</h3>
    <img src="${user.avatar || 'https://via.placeholder.com/100'}"><br>
    <p>Tên: ${user.name}</p>
    <p>Điểm: ${user.score}</p>
  `;
});

// ===== TOÁN =====
let correctAnswer = 0;

document.getElementById("mathBtn").addEventListener("click", function(){

  let num = Math.floor(Math.random()*50)+1;
  correctAnswer = Math.sqrt(num).toFixed(2);

  document.getElementById("content").innerHTML = `
    <h3>√${num} = ? (2 số)</h3>
    <input id="mathAnswer">
    <button id="submitMath">Nộp</button>
  `;

  document.getElementById("submitMath").addEventListener("click", function(){

    let ans = parseFloat(document.getElementById("mathAnswer").value).toFixed(2);
    let users = getUsers();
    let name = localStorage.getItem("currentUser");
    let user = users.find(u => u.name === name);

    if(ans === correctAnswer){
      alert("Đúng!");
      user.score += 10;
    }else{
      alert("Sai! Đáp án: " + correctAnswer);
    }

    saveUsers(users);
  });

});

// ===== XẾP HẠNG =====
document.getElementById("rankBtn").addEventListener("click", function(){

  let users = getUsers();
  users.sort((a,b) => b.score - a.score);

  let html = "<h3>Bảng xếp hạng</h3>";

  users.forEach((u,i)=>{
    html += `<p>${i+1}. ${u.name} - ${u.score} điểm</p>`;
  });

  document.getElementById("content").innerHTML = html;

});

// ===== AUTO LOAD =====
window.onload = function(){
  let name = localStorage.getItem("currentUser");
  if(name){
    let users = getUsers();
    let user = users.find(u => u.name === name);
    if(user){
      showMain(user);
    }
  }
};

</script>

</body>
</html>
