<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HTHT Full</title>
<style>
body{font-family:Arial;background:#eef2ff;text-align:center;margin:0}
.box{
  background:white;
  width:90%;
  max-width:420px;
  margin:20px auto;
  padding:20px;
  border-radius:12px;
  box-shadow:0 0 10px #ccc;
}
input,button{
  width:95%;
  padding:10px;
  margin:6px 0;
  border-radius:6px;
  border:1px solid #ccc;
}
button{background:#4f46e5;color:white;border:none}
.hidden{display:none}
img{
  width:100px;
  height:100px;
  border-radius:50%;
  object-fit:cover;
}
</style>
</head>
<body>

<div class="box" id="setupBox">
<h3>Nhập tên của bạn</h3>
<input type="text" id="nameInput" placeholder="Tên của bạn">
<input type="file" id="avatarInput" accept="image/*">
<button onclick="saveUser()">Bắt đầu</button>
</div>

<div class="box hidden" id="mainBox">
<h2 id="welcome"></h2>

<button onclick="showProfile()">Profile</button>
<button onclick="showMath()">Làm Toán</button>
<button onclick="showRank()">Xếp hạng</button>

<div id="content"></div>
</div>

<script>

// ===== LẤY USERS =====
function getUsers(){
  return JSON.parse(localStorage.getItem("users") || "[]");
}
function saveUsers(u){
  localStorage.setItem("users", JSON.stringify(u));
}

// ===== TẠO USER =====
function saveUser(){
  let name = nameInput.value.trim();
  let file = avatarInput.files[0];

  if(!name){ alert("Nhập tên đi 😑"); return; }

  let users = getUsers();

  if(users.find(u=>u.name===name)){
    alert("Tên đã tồn tại");
    return;
  }

  let reader = new FileReader();
  reader.onload = function(e){
    let user = {
      name:name,
      avatar:e.target.result || "",
      score:0
    };

    users.push(user);
    saveUsers(users);
    localStorage.setItem("currentUser", name);
    showMain(user);
  };

  if(file){
    reader.readAsDataURL(file);
  }else{
    reader.onload({target:{result:""}});
  }
}

// ===== MAIN =====
function showMain(user){
  setupBox.classList.add("hidden");
  mainBox.classList.remove("hidden");
  welcome.innerText="Xin chào "+user.name;
}

// ===== PROFILE =====
function showProfile(){
  let users=getUsers();
  let name=localStorage.getItem("currentUser");
  let u=users.find(x=>x.name===name);

  content.innerHTML=`
  <h3>Profile</h3>
  <img src="${u.avatar || 'https://via.placeholder.com/100'}"><br>
  <p>Tên: ${u.name}</p>
  <p>Điểm: ${u.score}</p>
  `;
}

// ===== TOÁN =====
let currentAnswer=0;
function showMath(){
  let n=Math.floor(Math.random()*50)+1;
  currentAnswer=Math.sqrt(n).toFixed(2);
  content.innerHTML=`
  <h3>√${n} = ? (2 số)</h3>
  <input id="mathAns">
  <button onclick="checkMath()">Nộp</button>
  `;
}

function checkMath(){
  let ans=parseFloat(mathAns.value).toFixed(2);
  let users=getUsers();
  let name=localStorage.getItem("currentUser");
  let u=users.find(x=>x.name===name);

  if(ans==currentAnswer){
    alert("Đúng!");
    u.score+=10;
  }else{
    alert("Sai! Đáp án "+currentAnswer);
  }

  saveUsers(users);
}

// ===== XẾP HẠNG =====
function showRank(){
  let users=getUsers();
  users.sort((a,b)=>b.score-a.score);

  let html="<h3>Bảng xếp hạng</h3>";
  users.forEach((u,i)=>{
    html+=`
    <p>${i+1}. ${u.name} - ${u.score} điểm</p>
    `;
  });

  content.innerHTML=html;
}

// ===== AUTO LOAD =====
window.onload=function(){
  let name=localStorage.getItem("currentUser");
  if(name){
    let users=getUsers();
    let u=users.find(x=>x.name===name);
    if(u) showMain(u);
  }
};

</script>

</body>
</html>
